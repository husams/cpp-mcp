# IndraDB test daemon for live BDD scenarios (@indradb tag).
#
# Usage:
#   docker compose -f tests/fixtures/indradb-compose.yml up -d
#
# Set environment variable for live tests:
#   export INDRADB_TEST_URI=indradb://localhost:27615
#
# Note: live scenarios are gated on INDRADB_TEST_URI; they are skipped
# automatically when the variable is absent (US-G5/AC-3 — no CI wiring).
#
# Port 27615 is the IndraDB upstream default.
---
services:
  indradb:
    image: indradb/indradb:5.0.0
    ports:
      - "27615:27615"
    command: ["rocksdb", "/data/indradb"]
    volumes:
      - indradb_data:/data/indradb
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=localhost:27615 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  indradb_data: {}
